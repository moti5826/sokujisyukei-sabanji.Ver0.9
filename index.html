<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マリオカートワールド即時集計機</title>

<style>
body{font-family:sans-serif;background:#111;color:white;}
table{border-collapse:collapse;}
td,th{border:1px solid #555;padding:4px;text-align:center;}

input{
width:90px;
background:#222;
color:white;
border:1px solid #555;
text-align:center;
}

.teamInput{width:120px;margin:3px;}
.shortcutInput{width:40px;}
.adjustInput{width:60px;}

button{margin:4px;}
</style>
</head>

<body>

<h1>マリオカートワールド即時集計機</h1>

形式：
<select id="formatSelect">
<option value="12">12v12</option>
<option value="8">8v8</option>
<option value="6">6v6</option>
<option value="4">4v4</option>
<option value="3">3v3</option>
<option value="2">2v2</option>
<option value="individual">個人戦</option>
</select>

<br><br>

レース数：
<select id="raceSelect"></select>

自チーム名：
<input id="myTeamInput">

目標順位：
<select id="targetRank"></select>

<br><br>

<button onclick="init()">生成</button>
<button onclick="resetInputs()">リセット</button>

<h2 id="remainRace">残りレース: -</h2>

<hr>

<div id="teamNameArea"></div>
<div id="playerNameArea"></div>

<br>
<div id="tableArea"></div>

<h2>コピー用</h2>
<textarea id="copyArea" rows="16" cols="45"></textarea>
<br>
<button onclick="copyScores()">コピー</button>

<script>

const POINT_TABLE=[
50,40,35,30,20,18,16,14,12,10,9,8,
7,6,5,4,3,3,2,2,1,1,1,1
];

const DATA_LIMIT = 2 * 60 * 60 * 1000;

let teams=[];
let players=[];
let raceCount=12;
let shortcutMap={};

const MY_TEAM_INDEX = 0;

window.onload = () => {

const savedTime = localStorage.getItem("mk_time");

if(savedTime){

const now = Date.now();

if(now - savedTime > DATA_LIMIT){

localStorage.clear();

}

}

};

for(let i=3;i<=32;i++){
raceSelect.append(new Option(i,i));
}

function init(){

localStorage.setItem("mk_time", Date.now());

const format=formatSelect.value;
raceCount=Number(raceSelect.value);

teams=[];
players=[];

teamNameArea.innerHTML="";
playerNameArea.innerHTML="";

if(format==="individual"){

playerNameArea.innerHTML="<h3>プレイヤー設定</h3>";

for(let i=0;i<24;i++){

players.push({name:`P${i+1}`,score:0});

playerNameArea.innerHTML+=`
${i+1}:
<input class="teamInput" id="playerName${i}"><br>
`;
}

}

else{

const teamSize=Number(format);
const teamCount=24/teamSize;

targetRank.innerHTML="";
for(let i=1;i<=teamCount;i++){
targetRank.append(new Option(`${i}位`,i));
}

teamNameArea.innerHTML="<h3>チーム設定</h3>";

for(let i=0;i<teamCount;i++){

teams.push({name:`Team${i+1}`,score:0,adjust:0});

teamNameArea.innerHTML+=`
チーム${i+1}
名前:<input class="teamInput" id="teamName${i}">
SC:<input class="shortcutInput" id="shortcut${i}" maxlength="2">
補正:<input class="adjustInput" id="adjust${i}" value="0"><br>
`;
}

}

buildShortcutMap();
buildTable();

}

function buildShortcutMap(){

shortcutMap={};

document.querySelectorAll(".shortcutInput").forEach((i,idx)=>{
if(i.value) shortcutMap[i.value]=idx;
});

}

function buildTable(){

tableArea.innerHTML="";
const table=document.createElement("table");

let head="<tr><th>順位</th>";

for(let r=1;r<=raceCount;r++) head+=`<th>R${r}</th>`;

head+="</tr>";
table.innerHTML=head;

for(let rank=1;rank<=24;rank++){

const tr=document.createElement("tr");
tr.innerHTML=`<td>${rank}</td>`;

for(let r=0;r<raceCount;r++){

const td=document.createElement("td");
const input=document.createElement("input");

input.dataset.rank=rank;
input.dataset.race=r;
input.dataset.team="";

input.addEventListener("input",()=>{

applyShortcut(input);
autoFillTeam(input);
moveDown(input);
recalcScores();

});

td.appendChild(input);
tr.appendChild(td);

}

table.appendChild(tr);
}

tableArea.appendChild(table);

}

function applyShortcut(input){

buildShortcutMap();

const key=input.value.trim();

if(shortcutMap[key]!==undefined){

const idx=shortcutMap[key];

const name=document.getElementById(`teamName${idx}`).value || `Team${idx+1}`;

input.value=name;
input.dataset.team=idx;

}

}

function moveDown(input){

const rank=Number(input.dataset.rank);
const race=Number(input.dataset.race);

if(rank<24){

const next=document.querySelector(`input[data-race="${race}"][data-rank="${rank+1}"]`);

if(next) next.focus();

}

}

function autoFillTeam(input){

const format=formatSelect.value;
if(format==="individual") return;

const teamSize=Number(format);
const race=input.dataset.race;

const col=[...document.querySelectorAll(`input[data-race="${race}"]`)];

let count=new Array(teams.length).fill(0);
let empty=[];

col.forEach(i=>{

if(i.value===""){
empty.push(i);
}else{
const t=i.dataset.team;
if(t!=="") count[Number(t)]++;
}

});

let incomplete=[];

count.forEach((c,i)=>{
if(c<teamSize) incomplete.push(i);
});

if(incomplete.length===1){

const teamIndex=incomplete[0];
const need=teamSize-count[teamIndex];

if(need===empty.length){

const name=document.getElementById(`teamName${teamIndex}`).value||`Team${teamIndex+1}`;

empty.forEach(i=>{
i.value=name;
i.dataset.team=teamIndex;
});

}

}

}

function getRemainingRaces(){

let finished=0;

for(let r=0;r<raceCount;r++){

const col=[...document.querySelectorAll(`input[data-race="${r}"]`)];

if(col.every(i=>i.value!=="")) finished++;

}

return raceCount-finished;

}

function recalcScores(){

const format=formatSelect.value;

let text="";

if(format!=="individual"){

teams.forEach(t=>t.score=0);

teams.forEach((t,i)=>{
t.name=document.getElementById(`teamName${i}`).value||`Team${i+1}`;
});

document.querySelectorAll("input[data-rank]").forEach(input=>{

if(input.value==="") return;

const teamIndex=input.dataset.team;

if(teamIndex==="") return;

const rank=Number(input.dataset.rank);

teams[teamIndex].score+=POINT_TABLE[rank-1];

});

const sorted=[...teams].sort((a,b)=>b.score-a.score);

const myTeam=teams[MY_TEAM_INDEX];

sorted.forEach((t,i)=>{

const diff=myTeam.score-t.score;

text+=`${i+1}. ${t.name} ${t.score}pts (${diff>=0?"+":""}${diff})\n`;

});

/* ★勝利確定判定追加 */

const remain=getRemainingRaces();

const teamSize=Number(format);
const myMin=myTeam.score + remain * POINT_TABLE[teamSize-1];
const enemyMax=Math.max(...teams.filter((t,i)=>i!==MY_TEAM_INDEX).map(t=>t.score + remain * POINT_TABLE[0]));

if(myTeam.score>enemyMax-remain*POINT_TABLE[0] && myMin>enemyMax){
text+="\n\n勝利確定！";
}

}

const remain=getRemainingRaces();

remainRace.textContent=`残りレース: ${remain}`;

text+=`\n残りレース:${remain}`;

copyArea.value=text;

}

function copyScores(){
copyArea.select();
document.execCommand("copy");
}

function resetInputs(){

if(!confirm("全データをリセットしますか？")) return;

localStorage.clear();
location.reload();

}

</script>
</body>
</html>
