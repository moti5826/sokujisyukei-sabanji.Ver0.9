html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マリオカートワールド即時集計機</title>

<style>
body{font-family:sans-serif;background:#111;color:white;}
table{border-collapse:collapse;}
td,th{border:1px solid #555;padding:4px;text-align:center;}

input{
  width:90px;
  background:#222;
  color:white;
  border:1px solid #555;
  text-align:center;
}

.teamInput{width:120px;margin:3px;}
.shortcutInput{width:40px;}
.adjustInput{width:60px;}

.obs{
  background:black;
  padding:10px;
  margin-top:20px;
  width:420px;
  font-size:22px;
}

button{margin:4px;}
</style>
</head>

<body>

<h1>マリオカートワールド即時集計機</h1>

形式：
<select id="formatSelect">
<option value="12">12v12</option>
<option value="8">8v8</option>
<option value="6">6v6</option>
<option value="4">4v4</option>
<option value="3">3v3</option>
<option value="2">2v2</option>
</select>

レース数：
<select id="raceSelect"></select>

自チーム名：
<input id="myTeamInput">

目標順位：
<select id="targetRank"></select>

<br><br>

OBS画像URL：
<input id="obsImageUrl" style="width:350px">

<br><br>

<button onclick="init()">生成</button>
<button onclick="resetInputs()">リセット</button>

<h2 id="remainRace">残りレース: -</h2>
<h2 id="targetStatus">目標順位: -</h2>
<h2 id="championStatus">勝利判定: -</h2>
<h2 id="rankLockStatus">自順位確定: -</h2>

<hr>

<div id="teamNameArea"></div>
<br>
<div id="tableArea"></div>

<h2>コピー用</h2>
<textarea id="copyArea" rows="14" cols="45"></textarea>
<br>
<button onclick="copyScores()">コピー</button>

<h2>OBS表示URL</h2>
<input id="obsURL" style="width:500px" readonly>

<script>

/* ============================= */
const POINT_TABLE=[
50,40,35,30,20,18,16,14,12,10,9,8,
7,6,5,4,3,3,2,2,1,1,1,1
];

let teams=[];
let raceCount=12;
let shortcutMap={};

/* ============================= */
/* 自チーム連動 */

function syncMyTeam(){

  const team1=document.getElementById("teamName0");
  const my=document.getElementById("myTeamInput");

  if(!team1 || !my) return;

  team1.addEventListener("input",()=>{
    my.value=team1.value;
  });

  my.addEventListener("input",()=>{
    team1.value=my.value;
  });
}

/* ===== 保存 ===== */

function saveInputs(){

  const data={
    teams:teams,
    inputs:[]
  };

  document.querySelectorAll("input[data-rank]").forEach(i=>{
    data.inputs.push({
      race:i.dataset.race,
      rank:i.dataset.rank,
      team:i.dataset.team,
      value:i.value
    });
  });

  localStorage.setItem("mk_score_data",JSON.stringify(data));
}

function loadInputs(){

  const data=JSON.parse(localStorage.getItem("mk_score_data")||"null");
  if(!data) return;

  setTimeout(()=>{

    data.inputs.forEach(d=>{
      const el=document.querySelector(
        `input[data-race="${d.race}"][data-rank="${d.rank}"]`
      );
      if(!el) return;

      el.value=d.value;
      el.dataset.team=d.team;
    });

    recalcScores();

  },200);
}

/* ===== OBS同期 ===== */

function saveOBS(text){
  localStorage.setItem("mk_obs_live",JSON.stringify({
    text,
    img:obsImageUrl.value
  }));
}

function loadOBS(){
  return JSON.parse(localStorage.getItem("mk_obs_live")||"{}");
}

const params=new URLSearchParams(location.search);
if(params.get("obs")){
  document.body.innerHTML="<div id='obsLive' class='obs'></div>";

  setInterval(()=>{
    const data=loadOBS();
    if(!data.text) return;

    document.getElementById("obsLive").innerHTML=
      (data.img?`<img src="${data.img}">`:"")+
      data.text.replace(/\n/g,"<br>");
  },300);
}

/* ============================= */

for(let i=8;i<=32;i++){
  raceSelect.append(new Option(i,i));
}

function init(){

  const teamSize=Number(formatSelect.value);
  raceCount=Number(raceSelect.value);
  const teamCount=24/teamSize;

  teams=[];

  targetRank.innerHTML="";
  for(let i=1;i<=teamCount;i++){
    targetRank.append(new Option(`${i}位`,i));
  }

  teamNameArea.innerHTML="<h3>チーム設定</h3>";

  for(let i=0;i<teamCount;i++){
    const name=`Team${i+1}`;
    teams.push({name,score:0,adjust:0});

    teamNameArea.innerHTML+=`
      チーム${i+1}
      名前:<input class="teamInput" id="teamName${i}">
      SC:<input class="shortcutInput" id="shortcut${i}" maxlength="1">
      補正:<input class="adjustInput" id="adjust${i}" value="0"><br>`;
  }

  addEnterMove();
  buildTable();

  obsURL.value=location.origin+location.pathname+"?obs=1";

  loadInputs();

  setTimeout(syncMyTeam,100);
}

function addEnterMove(){
  setTimeout(()=>{
    document.querySelectorAll(".teamInput,.shortcutInput,.adjustInput")
    .forEach((el,i,arr)=>{
      el.addEventListener("keydown",e=>{
        if(e.key==="Enter"){
          e.preventDefault();
          if(arr[i+1]) arr[i+1].focus();
        }
      });
    });
  },50);
}

function resetInputs(){
  if(!confirm("全データをリセットしますか？")) return;
  localStorage.clear();
  location.reload();
}

function buildTable(){

  tableArea.innerHTML="";
  const table=document.createElement("table");

  let head="<tr><th>順位</th>";
  for(let r=1;r<=raceCount;r++) head+=`<th>R${r}</th>`;
  head+="</tr>";
  table.innerHTML=head;

  for(let rank=1;rank<=24;rank++){

    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${rank}</td>`;

    for(let r=0;r<raceCount;r++){

      const td=document.createElement("td");
      const input=document.createElement("input");

      input.dataset.rank=rank;
      input.dataset.race=r;
      input.dataset.team="";

      input.addEventListener("keydown",(e)=>{

        if(e.key==="Enter"){
          e.preventDefault();
          moveNext(input);
          return;
        }

        if(e.key==="Backspace"){
          e.preventDefault();
          input.value="";
          input.dataset.team="";
          recalcScores();
          saveInputs();
          return;
        }

        const key=e.key.toLowerCase();
        if(shortcutMap[key]!==undefined){
          e.preventDefault();
          const idx=shortcutMap[key];
          input.dataset.team=idx;
          input.value=teams[idx].name;
          moveNext(input);
          recalcScores();
          saveInputs();
        }
      });

      input.addEventListener("input",()=>{
        const val=input.value.toLowerCase();

        const found=teams.findIndex(t=>
          t.name.toLowerCase().startsWith(val)
        );

        if(found!==-1){
          input.dataset.team=found;
        }

        autoFillRemaining(input.dataset.race);
        autoFillTeamLast(input.dataset.race);

        recalcScores();
        saveInputs();
      });

      td.appendChild(input);
      tr.appendChild(td);
    }

    table.appendChild(tr);
  }

  tableArea.appendChild(table);
}

function autoFillRemaining(race){

  const col=[...document.querySelectorAll(`input[data-race="${race}"]`)];
  const counts=new Array(teams.length).fill(0);

  col.forEach(i=>{
    if(i.dataset.team!==""){
      counts[Number(i.dataset.team)]++;
    }
  });

  const teamSize=24/teams.length;

  const remainTeams=counts
    .map((c,i)=>c<teamSize?i:null)
    .filter(v=>v!==null);

  if(remainTeams.length!==1) return;

  const teamIndex=remainTeams[0];

  col.forEach(input=>{
    if(input.dataset.team===""){
      input.dataset.team=teamIndex;
      input.value=teams[teamIndex].name;
    }
  });
}

function autoFillTeamLast(race){

  const col=[...document.querySelectorAll(`input[data-race="${race}"]`)];
  const teamSize=24/teams.length;

  const counts=new Array(teams.length).fill(0);

  col.forEach(i=>{
    if(i.dataset.team!==""){
      counts[Number(i.dataset.team)]++;
    }
  });

  const remaining=[];

  counts.forEach((c,i)=>{
    if(c<teamSize) remaining.push(i);
  });

  if(remaining.length!==1) return;

  const teamIndex=remaining[0];

  col.forEach(input=>{
    if(input.dataset.team===""){
      input.dataset.team=teamIndex;
      input.value=teams[teamIndex].name;
    }
  });
}

function moveNext(input){
  const race=Number(input.dataset.race);
  const rank=Number(input.dataset.rank);

  let next=document.querySelector(
    `input[data-race="${race}"][data-rank="${rank+1}"]`
  );

  if(!next){
    next=document.querySelector(
      `input[data-race="${race+1}"][data-rank="1"]`
    );
  }

  if(next) next.focus();
}

function getRemainingRaces(){
  let finished=0;
  for(let r=0;r<raceCount;r++){
    const col=[...document.querySelectorAll(`input[data-race="${r}"]`)];
    if(col.every(i=>i.dataset.team!=="")) finished++;
  }
  return raceCount-finished;
}

function recalcScores(){

  teams.forEach(t=>t.score=0);
  shortcutMap={};

  teams.forEach((t,i)=>{
    t.name=document.getElementById(`teamName${i}`).value;

    const sc=document.getElementById(`shortcut${i}`).value.toLowerCase();
    if(sc) shortcutMap[sc]=i;

    const adj=Number(document.getElementById(`adjust${i}`).value||0);
    t.adjust=adj;
  });

  document.querySelectorAll("input[data-rank]").forEach(input=>{
    if(input.dataset.team==="") return;
    const teamIndex=Number(input.dataset.team);
    const rank=Number(input.dataset.rank);
    teams[teamIndex].score+=POINT_TABLE[rank-1];
  });

  teams.forEach(t=>{
    t.score+=t.adjust;
  });

  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const myTeam=myTeamInput.value.trim();

  const remain=getRemainingRaces();
  remainRace.textContent=`残りレース: ${remain}`;

  const target=targetRank.value;

  let text=`残り${remain}レース\n`;
  text+=`目標順位：${target}位\n\n`;

  const my=sorted.find(t=>t.name===myTeam);

  sorted.forEach((team,i)=>{

    let diff=0;

    if(my){
      diff=team.score-my.score;
    }

    const sign=diff>0?`+${diff}`:diff;

    text+=`${i+1}. ${team.name} ${team.score}pts (${sign})\n`;

  });

  copyArea.value=text;
  saveOBS(text);
}

function copyScores(){
  copyArea.select();
  document.execCommand("copy");
}

</script>
</body>
</html>
